<script>
const API_KEY = "d7255npr01qjeeefusrgd7255npr01qjeeefuss0";

async function loadTopStocks() {
  const el = document.getElementById("stocks");
  el.innerHTML = "Loading top movers...";

  try {
    const res = await fetch(
      `https://finnhub.io/api/v1/stock/symbol?exchange=US&token=${API_KEY}`
    );
    const symbols = await res.json();

    // Take random sample (API limitation workaround)
    const sample = symbols
      .filter(s => s.type === "Common Stock")
      .sort(() => 0.5 - Math.random())
      .slice(0, 20);

    const quotes = await Promise.all(
      sample.map(s =>
        fetch(`https://finnhub.io/api/v1/quote?symbol=${s.symbol}&token=${API_KEY}`)
          .then(r => r.json())
          .then(d => ({
            symbol: s.symbol,
            price: d.c || 0,
            change: d.d || 0,
            percent: d.dp || 0
          }))
      )
    );

    // Sort by biggest % gain
    const top10 = quotes
      .sort((a, b) => b.percent - a.percent)
      .slice(0, 10);

    el.innerHTML = "";

    top10.forEach(stock => {
      const row = document.createElement("div");
      row.className = "stock";

      row.innerHTML = `
        <div class="symbol">${stock.symbol}</div>
        <div class="price">$${stock.price.toFixed(2)}</div>
        <div class="${stock.change >= 0 ? "positive" : "negative"}">
          ${stock.change.toFixed(2)} (${stock.percent.toFixed(2)}%)
        </div>
      `;

      el.appendChild(row);
    });

  } catch (err) {
    el.innerHTML = "Error loading live data";
  }
}

// refresh every 10 seconds for more “real-time” feel
loadTopStocks();
setInterval(loadTopStocks, 10000);
</script>
